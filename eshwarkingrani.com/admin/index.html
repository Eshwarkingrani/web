<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Eshwar Kingrani</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-dark: #0a0a0a; --text-dark: #ffffff; --neon-blue: #00f0ff; --neon-pink: #ff00d4; --neon-green: #39ff14; --card-dark: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Roboto', sans-serif; background: var(--bg-dark); color: var(--text-dark); }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: rgba(10, 10, 10, 0.95); border-right: 1px solid rgba(0, 240, 255, 0.1); padding: 1rem; position: fixed; height: 100%; overflow-y: auto; }
        .sidebar h2 { font-family: 'Poppins', sans-serif; background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 1rem 0; margin-bottom: 1rem; }
        .nav-item { padding: 1rem; cursor: pointer; border-radius: 10px; margin-bottom: 0.5rem; transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink)); color: white; }
        .main-content { margin-left: 250px; flex: 1; padding: 2rem; padding-bottom: 80px; }
        .section { display: none; }
        .section.active { display: block; }
        .section-header { font-family: 'Poppins', sans-serif; font-size: 2rem; color: var(--neon-blue); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--neon-pink); font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 10px; background: var(--card-dark); color: var(--text-dark); font-size: 1rem; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .card { background: var(--card-dark); border: 1px solid rgba(0, 240, 255, 0.1); border-radius: 15px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card-title { font-family: 'Poppins', sans-serif; font-size: 1.2rem; color: var(--neon-blue); margin-bottom: 1rem; }
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink)); color: white; }
        .btn-danger { background: #ff4444; color: white; }
        .btn-success { background: var(--neon-green); color: #000; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 240, 255, 0.3); }
        .save-bar { position: fixed; bottom: 0; left: 250px; right: 0; background: rgba(10, 10, 10, 0.95); border-top: 1px solid rgba(0, 240, 255, 0.1); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 1rem 2rem; border-radius: 10px; color: white; font-weight: 600; display: none; z-index: 9999; }
        .notification.success { background: var(--neon-green); color: #000; }
        .notification.error { background: #ff4444; }
        .item-list { display: grid; gap: 1rem; }
        .item-card { background: var(--card-dark); border: 1px solid rgba(0, 240, 255, 0.1); border-radius: 10px; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .item-info h4 { color: var(--neon-blue); margin-bottom: 0.3rem; }
        .item-info p { font-size: 0.85rem; opacity: 0.8; }
        .add-form { background: var(--card-dark); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 15px; padding: 1.5rem; margin-top: 1rem; display: none; }
        .add-form.active { display: block; }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>
    <div class="admin-container">
        <div class="sidebar">
            <h2>⚙️ Admin Panel</h2>
            <div class="nav-item active" onclick="showSection('home')">🏠 Home</div>
            <div class="nav-item" onclick="showSection('about')">👤 About</div>
            <div class="nav-item" onclick="showSection('services')">🛠️ Services</div>
            <div class="nav-item" onclick="showSection('projects')">📁 Projects</div>
            <div class="nav-item" onclick="showSection('certificates')">🏆 Certificates</div>
            <div class="nav-item" onclick="showSection('book')">📚 My Book</div>
        </div>
        <div class="main-content">
            <!-- Home Section -->
            <div id="home-section" class="section active">
                <h2 class="section-header">Home Page</h2>
                <div class="card">
                    <h3 class="card-title">Profile Information</h3>
                    <div class="form-group"><label>Name</label><input type="text" id="siteName"></div>
                    <div class="form-group"><label>Tagline</label><input type="text" id="siteTagline"></div>
                    <div class="form-group"><label>Description</label><textarea id="siteDescription"></textarea></div>
                    <div class="form-group"><label>Profile Image Path</label><input type="text" id="profileImage"></div>
                </div>
                <div class="card">
                    <h3 class="card-title">Contact Information</h3>
                    <div class="form-group"><label>Email</label><input type="text" id="siteEmail"></div>
                    <div class="form-group"><label>LinkedIn URL</label><input type="text" id="siteLinkedin"></div>
                    <div class="form-group"><label>Location</label><input type="text" id="siteLocation"></div>
                </div>
            </div>
            <!-- About Section -->
            <div id="about-section" class="section">
                <h2 class="section-header">About Page</h2>
                <div class="card">
                    <h3 class="card-title">About Content</h3>
                    <div class="form-group"><label>Who Am I</label><textarea id="aboutWhoAmI"></textarea></div>
                    <div class="form-group"><label>Background</label><textarea id="aboutBackground"></textarea></div>
                    <div class="form-group"><label>Vision & Goals</label><textarea id="aboutVision"></textarea></div>
                    <div class="form-group"><label>My Work</label><textarea id="aboutWork"></textarea></div>
                </div>
                <div class="card">
                    <h3 class="card-title">Skills</h3>
                    <div id="skillsList" class="item-list"></div>
                    <button class="btn btn-primary" onclick="document.getElementById('addSkillForm').classList.add('active')" style="margin-top:1rem">+ Add Skill</button>
                    <div id="addSkillForm" class="add-form">
                        <div class="form-group"><label>Icon (emoji)</label><input type="text" id="newSkillIcon"></div>
                        <div class="form-group"><label>Title</label><input type="text" id="newSkillTitle"></div>
                        <div class="form-group"><label>Description</label><input type="text" id="newSkillDesc"></div>
                        <button class="btn btn-success" onclick="addSkill()">Save</button>
                        <button class="btn btn-danger" onclick="document.getElementById('addSkillForm').classList.remove('active')">Cancel</button>
                    </div>
                </div>
            </div>
            <!-- Services Section -->
            <div id="services-section" class="section">
                <h2 class="section-header">Services</h2>
                <div id="servicesList" class="item-list"></div>
                <button class="btn btn-primary" onclick="document.getElementById('addServiceForm').classList.add('active')" style="margin-top:1rem">+ Add Service</button>
                <div id="addServiceForm" class="add-form">
                    <div class="form-group"><label>Icon (emoji)</label><input type="text" id="newServiceIcon"></div>
                    <div class="form-group"><label>Title</label><input type="text" id="newServiceTitle"></div>
                    <div class="form-group"><label>Description</label><textarea id="newServiceDesc"></textarea></div>
                    <div class="form-group"><label>Features (comma separated)</label><input type="text" id="newServiceFeatures"></div>
                    <button class="btn btn-success" onclick="addService()">Save</button>
                    <button class="btn btn-danger" onclick="document.getElementById('addServiceForm').classList.remove('active')">Cancel</button>
                </div>
            </div>
            <!-- Projects Section -->
            <div id="projects-section" class="section">
                <h2 class="section-header">Projects</h2>
                <div id="projectsList" class="item-list"></div>
                <button class="btn btn-primary" onclick="document.getElementById('addProjectForm').classList.add('active')" style="margin-top:1rem">+ Add Project</button>
                <div id="addProjectForm" class="add-form">
                    <div class="form-group"><label>Icon (emoji)</label><input type="text" id="newProjectIcon"></div>
                    <div class="form-group"><label>Project Name</label><input type="text" id="newProjectName"></div>
                    <div class="form-group"><label>Subtitle</label><input type="text" id="newProjectSubtitle"></div>
                    <div class="form-group"><label>Description</label><textarea id="newProjectDesc"></textarea></div>
                    <div class="form-group"><label>Link</label><input type="text" id="newProjectLink"></div>
                    <button class="btn btn-success" onclick="addProject()">Save</button>
                    <button class="btn btn-danger" onclick="document.getElementById('addProjectForm').classList.remove('active')">Cancel</button>
                </div>
            </div>
            <!-- Certificates Section -->
            <div id="certificates-section" class="section">
                <h2 class="section-header">Certificates</h2>
                <div id="certificatesList" class="item-list"></div>
                <button class="btn btn-primary" onclick="document.getElementById('addCertForm').classList.add('active')" style="margin-top:1rem">+ Add Certificate</button>
                <div id="addCertForm" class="add-form">
                    <div class="form-group"><label>Certificate Name</label><input type="text" id="newCertName"></div>
                    <div class="form-group"><label>Issuer</label><input type="text" id="newCertIssuer"></div>
                    <div class="form-group"><label>Date</label><input type="text" id="newCertDate"></div>
                    <div class="form-group"><label>Image Path</label><input type="text" id="newCertImage"></div>
                    <button class="btn btn-success" onclick="addCertificate()">Save</button>
                    <button class="btn btn-danger" onclick="document.getElementById('addCertForm').classList.remove('active')">Cancel</button>
                </div>
            </div>
            <!-- Book Section -->
            <div id="book-section" class="section">
                <h2 class="section-header">My Book</h2>
                <div class="card">
                    <h3 class="card-title">Book Information</h3>
                    <div class="form-group"><label>Title</label><input type="text" id="bookTitle"></div>
                    <div class="form-group"><label>Author</label><input type="text" id="bookAuthor"></div>
                    <div class="form-group"><label>Description</label><textarea id="bookDescription"></textarea></div>
                    <div class="form-group"><label>Cover Image URL</label><input type="text" id="bookCover"></div>
                    <div class="form-group"><label>E-book Link</label><input type="text" id="bookEbook"></div>
                </div>
                <div class="card">
                    <h3 class="card-title">Content</h3>
                    <div class="form-group"><label>Introduction</label><textarea id="bookIntro"></textarea></div>
                    <div class="form-group"><label>Goal</label><textarea id="bookGoal"></textarea></div>
                    <div class="form-group"><label>Author Message</label><textarea id="bookMessage"></textarea></div>
                    <div class="form-group"><label>Quote</label><input type="text" id="bookQuote"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="save-bar">
        <span style="color: var(--neon-blue);">💡 Open admin folder with Live Server to use</span>
        <button class="btn btn-success" onclick="saveData()">💾 Save to data.json</button>
    </div>
    <script>
        let siteData = {};
        
        // Load data from JSON file first, then fall back to defaults
        async function loadInitialData() {
            try {
                const response = await fetch('../data.json');
                if (response.ok) {
                    siteData = await response.json();
                    console.log('✅ Loaded data from data.json');
                } else {
                    throw new Error('File not found');
                }
            } catch (error) {
                console.log('⚠️ Using default data (no data.json found)');
                siteData = {
                    "site": {"name": "Eshwar Kingrani", "tagline": "The Future AI Specialist", "description": "", "profileImage": "assets/mypic.jpg", "email": "eshwarwashdev.2712@gmail.com", "linkedin": "", "location": "Karachi, Pakistan"},
                    "about": {"whoAmI": "", "background": "", "vision": "", "work": "", "skills": []},
                    "services": [],
                    "projects": [],
                    "certificates": [],
                    "book": {"title": "", "author": "", "description": "", "coverImage": "", "ebookLink": "", "intro": "", "goal": "", "authorMessage": "", "quote": ""}
                };
            }
            populateForms();
        }

        loadInitialData();

        function populateForms() {
            document.getElementById('siteName').value = siteData.site?.name || '';
            document.getElementById('siteTagline').value = siteData.site?.tagline || '';
            document.getElementById('siteDescription').value = siteData.site?.description || '';
            document.getElementById('profileImage').value = siteData.site?.profileImage || '';
            document.getElementById('siteEmail').value = siteData.site?.email || '';
            document.getElementById('siteLinkedin').value = siteData.site?.linkedin || '';
            document.getElementById('siteLocation').value = siteData.site?.location || '';
            document.getElementById('aboutWhoAmI').value = siteData.about?.whoAmI || '';
            document.getElementById('aboutBackground').value = siteData.about?.background || '';
            document.getElementById('aboutVision').value = siteData.about?.vision || '';
            document.getElementById('aboutWork').value = siteData.about?.work || '';
            document.getElementById('bookTitle').value = siteData.book?.title || '';
            document.getElementById('bookAuthor').value = siteData.book?.author || '';
            document.getElementById('bookDescription').value = siteData.book?.description || '';
            document.getElementById('bookCover').value = siteData.book?.coverImage || '';
            document.getElementById('bookEbook').value = siteData.book?.ebookLink || '';
            document.getElementById('bookIntro').value = siteData.book?.intro || '';
            document.getElementById('bookGoal').value = siteData.book?.goal || '';
            document.getElementById('bookMessage').value = siteData.book?.authorMessage || '';
            document.getElementById('bookQuote').value = siteData.book?.quote || '';
            renderSkills(); renderServices(); renderProjects(); renderCertificates();
        }

        function renderSkills() {
            const s = siteData.about?.skills || [];
            document.getElementById('skillsList').innerHTML = s.map((i,idx)=>`<div class="item-card"><div class="item-info"><h4>${i.icon} ${i.title}</h4><p>${i.description}</p></div><button class="btn btn-danger" onclick="deleteItem('skills',${idx})">Delete</button></div>`).join('');
        }
        function renderServices() {
            const s = siteData.services || [];
            document.getElementById('servicesList').innerHTML = s.map((i,idx)=>`<div class="item-card"><div class="item-info"><h4>${i.icon} ${i.title}</h4><p>${(i.description||'').substring(0,50)}</p></div><button class="btn btn-danger" onclick="deleteItem('services',${idx})">Delete</button></div>`).join('');
        }
        function renderProjects() {
            const s = siteData.projects || [];
            document.getElementById('projectsList').innerHTML = s.map((i,idx)=>`<div class="item-card"><div class="item-info"><h4>${i.icon} ${i.name}</h4><p>${i.subtitle}</p></div><button class="btn btn-danger" onclick="deleteItem('projects',${idx})">Delete</button></div>`).join('');
        }
        function renderCertificates() {
            const s = siteData.certificates || [];
            document.getElementById('certificatesList').innerHTML = s.map((i,idx)=>`<div class="item-card"><div class="item-info"><h4>🏆 ${i.name}</h4><p>${i.issuer} | ${i.date}</p></div><button class="btn btn-danger" onclick="deleteItem('certificates',${idx})">Delete</button></div>`).join('');
        }

        function showSection(s) {
            document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(s+'-section').classList.add('active');
            event.target.classList.add('active');
        }

        function addSkill() {
            const i = document.getElementById('newSkillIcon').value, t = document.getElementById('newSkillTitle').value, d = document.getElementById('newSkillDesc').value;
            if(t){ if(!siteData.about)siteData.about={}; if(!siteData.about.skills)siteData.about.skills=[]; siteData.about.skills.push({icon:i,title:t,description:d}); renderSkills(); document.getElementById('addSkillForm').classList.remove('active'); showNotification('Skill added!'); }
        }
        function addService() {
            const i = document.getElementById('newServiceIcon').value, t = document.getElementById('newServiceTitle').value, d = document.getElementById('newServiceDesc').value, f = document.getElementById('newServiceFeatures').value.split(',').map(x=>x.trim());
            if(t){ if(!siteData.services)siteData.services=[]; siteData.services.push({icon:i,title:t,description:d,features:f}); renderServices(); document.getElementById('addServiceForm').classList.remove('active'); showNotification('Service added!'); }
        }
        function addProject() {
            const i = document.getElementById('newProjectIcon').value, n = document.getElementById('newProjectName').value, s = document.getElementById('newProjectSubtitle').value, d = document.getElementById('newProjectDesc').value, l = document.getElementById('newProjectLink').value;
            if(n){ if(!siteData.projects)siteData.projects=[]; siteData.projects.push({icon:i,name:n,subtitle:s,description:d,link:l}); renderProjects(); document.getElementById('addProjectForm').classList.remove('active'); showNotification('Project added!'); }
        }
        function addCertificate() {
            const n = document.getElementById('newCertName').value, i = document.getElementById('newCertIssuer').value, d = document.getElementById('newCertDate').value, m = document.getElementById('newCertImage').value;
            if(n){ if(!siteData.certificates)siteData.certificates=[]; siteData.certificates.push({name:n,issuer:i,date:d,image:m}); renderCertificates(); document.getElementById('addCertForm').classList.remove('active'); showNotification('Certificate added!'); }
        }
        function deleteItem(type, idx) {
            if(confirm('Delete?')){
                if(type==='skills')siteData.about.skills.splice(idx,1);
                else if(type==='services')siteData.services.splice(idx,1);
                else if(type==='projects')siteData.projects.splice(idx,1);
                else if(type==='certificates')siteData.certificates.splice(idx,1);
                if(type==='skills')renderSkills();else if(type==='services')renderServices();else if(type==='projects')renderProjects();else if(type==='certificates')renderCertificates();
            }
        }

        function saveData() {
            siteData.site = {name:document.getElementById('siteName').value, tagline:document.getElementById('siteTagline').value, description:document.getElementById('siteDescription').value, profileImage:document.getElementById('profileImage').value, email:document.getElementById('siteEmail').value, linkedin:document.getElementById('siteLinkedin').value, location:document.getElementById('siteLocation').value};
            siteData.about = {whoAmI:document.getElementById('aboutWhoAmI').value, background:document.getElementById('aboutBackground').value, vision:document.getElementById('aboutVision').value, work:document.getElementById('aboutWork').value, skills:siteData.about?.skills||[]};
            siteData.book = {title:document.getElementById('bookTitle').value, author:document.getElementById('bookAuthor').value, description:document.getElementById('bookDescription').value, coverImage:document.getElementById('bookCover').value, ebookLink:document.getElementById('bookEbook').value, intro:document.getElementById('bookIntro').value, goal:document.getElementById('bookGoal').value, authorMessage:document.getElementById('bookMessage').value, quote:document.getElementById('bookQuote').value};
            
            // Download JSON file
            const blob = new Blob([JSON.stringify(siteData,null,2)],{type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'data.json'; a.click();
            showNotification('✅ data.json downloaded! Replace the old one and push to GitHub.');
        }

        function showNotification(m) { const n=document.getElementById('notification'); n.textContent=m; n.className='notification success'; n.style.display='block'; setTimeout(()=>n.style.display='none',3000); }
    </script>
</body>
</html>
